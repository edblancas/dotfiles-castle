schemaVersion = 1

[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 49
    carbonModifiers = 256

[[leaderMode.bindings]]
key = 't'
url = 'tuna://run/path.%252FApplications%252FGhostty.app/Open'

[[leaderMode.bindings]]
key = 'o'

    [[leaderMode.bindings.children]]
    key = 'i'
    url = 'tuna://run/path.%252FSystem%252FApplications%252FMusic.app/Open'

[[leaderMode.bindings]]
iconPath = 'uiwindow.split.2x1'
key = 'a'
label = 'Aerospace'

    [[leaderMode.bindings.children]]
    iconPath = 'uiwindow.split.2x1'
    key = 'w'
    label = 'move workspace to monitor'
    url = 'tuna://run/text.%252Fopt%252Fhomebrew%252Fbin%252Faerospace%2520move-workspace-to-monitor%2520--wrap-around%2520next/Run%20Text%20as%20Shell%20Command'

    [[leaderMode.bindings.children]]
    iconPath = 'uiwindow.split.2x1'
    key = 'f'
    label = 'fullscreen'
    url = 'tuna://run/text.%252Fopt%252Fhomebrew%252Fbin%252Faerospace%2520fullscreen/Run%20Text%20as%20Shell%20Command'

    [[leaderMode.bindings.children]]
    iconPath = 'uiwindow.split.2x1'
    key = 't'
    label = 'toggle between floating and tiling layout'
    url = 'tuna://run/text.%252Fopt%252Fhomebrew%252Fbin%252Faerospace%2520layout%2520floating%2520tiling/Run%20Text%20as%20Shell%20Command'

    [[leaderMode.bindings.children]]
