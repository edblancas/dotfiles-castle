[[leaderMode.bindings]]
key = 'r'

    [[leaderMode.bindings.children]]
    key = 'e'
    url = 'tuna://run/url.raycast:%252F%252Fextensions%252Fraycast%252Femoji-symbols%252Fsearch-emoji-symbols/Open%20URL'

    [[leaderMode.bindings.children]]
    key = 'p'
